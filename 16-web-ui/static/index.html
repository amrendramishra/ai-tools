<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal AI Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #212121;
  --bg-secondary: #171717;
  --bg-tertiary: #2f2f2f;
  --bg-hover: #3a3a3a;
  --text-primary: #ececec;
  --text-secondary: #b4b4b4;
  --text-muted: #8e8e8e;
  --border-color: #3a3a3a;
  --accent: #10a37f;
  --accent-hover: #1a7f64;
  --code-bg: #1a1a2e;
  --code-border: #333355;
  --msg-user-bg: #2f2f2f;
  --msg-ai-bg: transparent;
  --scrollbar-thumb: #4a4a4a;
  --danger: #ef4444;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
}
/* Sidebar */
.sidebar {
  width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 12px;
  border-bottom: 1px solid var(--border-color);
}
.new-chat-btn {
  width: 100%;
  padding: 10px 16px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  color: var(--text-primary);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s;
}
.new-chat-btn:hover { background: var(--bg-hover); }
.conversations-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.conv-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
  transition: background 0.2s;
}
.conv-item:hover { background: var(--bg-tertiary); }
.conv-item.active { background: var(--bg-tertiary); color: var(--text-primary); }
.conv-item .delete-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
}
.conv-item:hover .delete-btn { display: block; }
.conv-item .delete-btn:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
/* Main chat area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
}
.chat-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-primary);
}
.menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
.menu-btn:hover { background: var(--bg-tertiary); }
.model-select {
  padding: 6px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.model-select:focus { border-color: var(--accent); }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}
.message {
  max-width: 800px;
  margin: 0 auto 20px;
  padding: 16px 20px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 15px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message.user {
  background: var(--msg-user-bg);
  border: 1px solid var(--border-color);
}
.message.assistant { background: var(--msg-ai-bg); }
.message-role {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.message-content p { margin-bottom: 10px; }
.message-content p:last-child { margin-bottom: 0; }
.message-content ul, .message-content ol { margin: 8px 0; padding-left: 24px; }
.message-content li { margin-bottom: 4px; }
.message-content strong { color: var(--text-primary); font-weight: 600; }
.message-content em { font-style: italic; color: var(--text-secondary); }
/* Code blocks */
.code-block {
  position: relative;
  margin: 12px 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--code-border);
}
.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: #1e1e3a;
  font-size: 12px;
  color: var(--text-muted);
}
.copy-btn {
  background: none;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s;
}
.copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.code-block pre {
  margin: 0;
  padding: 14px 16px;
  overflow-x: auto;
  background: var(--code-bg);
  font-size: 13px;
  line-height: 1.5;
}
.code-block code {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  color: #e0e0e0;
}
.message-content code:not(.code-block code) {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
  border: 1px solid var(--code-border);
}
/* Syntax highlighting */
.hljs-keyword, .hljs-built_in { color: #c792ea; }
.hljs-string { color: #c3e88d; }
.hljs-number { color: #f78c6c; }
.hljs-comment { color: #676e95; font-style: italic; }
.hljs-function { color: #82aaff; }
.hljs-class { color: #ffcb6b; }
.hljs-variable { color: #f07178; }
.hljs-operator { color: #89ddff; }
.hljs-property { color: #80cbc4; }
/* Input area */
.input-area {
  padding: 16px 20px 24px;
  background: var(--bg-primary);
  border-top: 1px solid var(--border-color);
}
.input-container {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-wrapper {
  flex: 1;
  position: relative;
}
#chat-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 200px;
  line-height: 1.5;
  transition: border-color 0.2s;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--text-muted); }
.send-btn, .stop-btn {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}
.send-btn {
  background: var(--accent);
  color: white;
}
.send-btn:hover:not(:disabled) { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.stop-btn {
  background: var(--danger);
  color: white;
  display: none;
}
.stop-btn:hover { background: #dc2626; }
/* Welcome screen */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  text-align: center;
  padding: 40px;
}
.welcome h1 { font-size: 28px; color: var(--text-primary); margin-bottom: 8px; }
.welcome p { font-size: 15px; margin-bottom: 24px; }
/* Typing indicator */
.typing-indicator { display: inline-flex; gap: 4px; padding: 4px 0; }
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #5a5a5a; }
/* Responsive */
@media (max-width: 768px) {
  .sidebar { position: fixed; z-index: 100; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: block; }
  .message { padding: 12px 16px; }
  .input-area { padding: 12px 16px 16px; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="new-chat-btn" onclick="newConversation()">
      <span>＋</span> New Chat
    </button>
  </div>
  <div class="conversations-list" id="conversations-list"></div>
</aside>

<!-- Main Chat Area -->
<main class="main">
  <header class="chat-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <select class="model-select" id="model-select">
      <option value="">Loading models...</option>
    </select>
  </header>

  <div class="chat-messages" id="chat-messages">
    <div class="welcome" id="welcome">
      <h1>🤖 Personal AI Chat</h1>
      <p>Powered by Ollama • Running locally</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <div class="input-wrapper">
        <textarea id="chat-input" rows="1" placeholder="Send a message..." onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
      <button class="stop-btn" id="stop-btn" onclick="stopGeneration()">Stop</button>
    </div>
  </div>
</main>

<script>
// ===== State =====
let conversations = JSON.parse(localStorage.getItem('conversations') || '[]');
let activeConvId = localStorage.getItem('activeConvId') || null;
let isGenerating = false;
let currentRequestId = null;
let abortController = null;

// ===== Initialization =====
document.addEventListener('DOMContentLoaded', () => {
  loadModels();
  renderConversations();
  if (activeConvId) loadConversation(activeConvId);
});

async function loadModels() {
  try {
    const resp = await fetch('/api/models');
    const data = await resp.json();
    const select = document.getElementById('model-select');
    select.innerHTML = '';
    if (data.models && data.models.length > 0) {
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        select.appendChild(opt);
      });
      // Restore last selected model
      const lastModel = localStorage.getItem('selectedModel');
      if (lastModel && data.models.includes(lastModel)) select.value = lastModel;
    } else {
      select.innerHTML = '<option value="">No models found</option>';
    }
  } catch (e) {
    document.getElementById('model-select').innerHTML = '<option value="">Ollama offline</option>';
  }
}

// ===== Conversation Management =====
function newConversation() {
  const conv = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    title: 'New Chat',
    messages: [],
    created: Date.now()
  };
  conversations.unshift(conv);
  activeConvId = conv.id;
  saveState();
  renderConversations();
  renderMessages();
  document.getElementById('chat-input').focus();
  closeSidebarMobile();
}

function loadConversation(id) {
  activeConvId = id;
  localStorage.setItem('activeConvId', id);
  renderConversations();
  renderMessages();
  closeSidebarMobile();
}

function deleteConversation(id, e) {
  e.stopPropagation();
  conversations = conversations.filter(c => c.id !== id);
  if (activeConvId === id) {
    activeConvId = conversations.length > 0 ? conversations[0].id : null;
  }
  saveState();
  renderConversations();
  renderMessages();
}

function getActiveConversation() {
  return conversations.find(c => c.id === activeConvId);
}

function saveState() {
  localStorage.setItem('conversations', JSON.stringify(conversations));
  localStorage.setItem('activeConvId', activeConvId || '');
  localStorage.setItem('selectedModel', document.getElementById('model-select').value);
}

function renderConversations() {
  const list = document.getElementById('conversations-list');
  list.innerHTML = conversations.map(c => `
    <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="loadConversation('${c.id}')">
      <span style="overflow:hidden;text-overflow:ellipsis">${escapeHtml(c.title)}</span>
      <button class="delete-btn" onclick="deleteConversation('${c.id}', event)">✕</button>
    </div>
  `).join('');
}

// ===== Message Rendering =====
function renderMessages() {
  const container = document.getElementById('chat-messages');
  const conv = getActiveConversation();
  const welcome = document.getElementById('welcome');

  if (!conv || conv.messages.length === 0) {
    container.innerHTML = '';
    container.appendChild(welcome);
    welcome.style.display = 'flex';
    return;
  }

  welcome.style.display = 'none';
  container.innerHTML = conv.messages.map((msg, i) => `
    <div class="message ${msg.role}" id="msg-${i}">
      <div class="message-role">${msg.role === 'user' ? '👤 You' : '🤖 Assistant'}</div>
      <div class="message-content">${renderMarkdown(msg.content)}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

function renderMarkdown(text) {
  if (!text) return '';
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const highlighted = highlightCode(escapeHtml(code.trim()), lang);
    return `<div class="code-block"><div class="code-header"><span>${lang || 'code'}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>${highlighted}</code></pre></div>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h4 style="margin:12px 0 6px;color:var(--text-primary)">$1</h4>');
  text = text.replace(/^## (.+)$/gm, '<h3 style="margin:14px 0 8px;color:var(--text-primary)">$1</h3>');
  text = text.replace(/^# (.+)$/gm, '<h2 style="margin:16px 0 10px;color:var(--text-primary)">$1</h2>');
  // Bold and italic
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Lists
  text = text.replace(/^\- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  // Line breaks / paragraphs
  text = text.replace(/\n\n/g, '</p><p>');
  text = text.replace(/\n/g, '<br>');
  text = '<p>' + text + '</p>';
  text = text.replace(/<p><\/p>/g, '');
  return text;
}

function highlightCode(code, lang) {
  // Basic syntax highlighting
  // Keywords
  code = code.replace(/\b(function|const|let|var|return|if|else|for|while|class|import|export|from|async|await|try|catch|throw|new|this|def|self|print|elif|except|finally|yield|lambda|with|as|pass|break|continue|raise|None|True|False|int|str|float|bool|list|dict|type|interface|enum|struct|impl|fn|pub|use|mod|crate|mut|match|loop)\b/g, '<span class="hljs-keyword">$1</span>');
  // Strings
  code = code.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="hljs-string">$&</span>');
  // Numbers
  code = code.replace(/\b(\d+\.?\d*)\b/g, '<span class="hljs-number">$1</span>');
  // Comments (single line)
  code = code.replace(/(\/\/.*$|#.*$)/gm, '<span class="hljs-comment">$1</span>');
  // Function calls
  code = code.replace(/(\w+)(?=\()/g, '<span class="hljs-function">$1</span>');
  return code;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

// ===== Chat Logic =====
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isGenerating) return;

  const model = document.getElementById('model-select').value;
  if (!model) { alert('Please select a model'); return; }

  // Ensure we have an active conversation
  if (!activeConvId) newConversation();
  const conv = getActiveConversation();

  // Add user message
  conv.messages.push({ role: 'user', content: text });

  // Update title from first message
  if (conv.messages.length === 1) {
    conv.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
    renderConversations();
  }

  input.value = '';
  autoResize(input);
  renderMessages();

  // Start generation
  isGenerating = true;
  currentRequestId = Date.now().toString(36);
  toggleButtons(true);

  // Add empty assistant message
  conv.messages.push({ role: 'assistant', content: '' });
  const msgIdx = conv.messages.length - 1;

  // Add streaming message element
  const container = document.getElementById('chat-messages');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';
  msgDiv.innerHTML = `<div class="message-role">🤖 Assistant</div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        messages: conv.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content })),
        request_id: currentRequestId
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullContent = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.error) {
              fullContent += `\n\n**Error:** ${data.error}`;
              break;
            }
            if (data.content) {
              fullContent += data.content;
              const contentDiv = msgDiv.querySelector('.message-content');
              contentDiv.innerHTML = renderMarkdown(fullContent);
              container.scrollTop = container.scrollHeight;
            }
            if (data.done) break;
          } catch (e) { /* skip malformed */ }
        }
      }
    }

    conv.messages[msgIdx].content = fullContent;
    saveState();

  } catch (e) {
    const contentDiv = msgDiv.querySelector('.message-content');
    if (e.name !== 'AbortError') {
      contentDiv.innerHTML = `<p style="color:var(--danger)">Error: ${escapeHtml(e.message)}</p>`;
      conv.messages[msgIdx].content = `Error: ${e.message}`;
    }
  } finally {
    isGenerating = false;
    currentRequestId = null;
    toggleButtons(false);
    saveState();
  }
}

async function stopGeneration() {
  if (!isGenerating || !currentRequestId) return;
  try {
    await fetch('/api/chat/stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request_id: currentRequestId })
    });
  } catch (e) { /* ignore */ }
  isGenerating = false;
  toggleButtons(false);
}

function toggleButtons(generating) {
  document.getElementById('send-btn').style.display = generating ? 'none' : 'block';
  document.getElementById('stop-btn').style.display = generating ? 'block' : 'none';
  document.getElementById('send-btn').disabled = generating;
}

// ===== UI Utilities =====
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function closeSidebarMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

// Save model selection
document.getElementById('model-select').addEventListener('change', () => {
  localStorage.setItem('selectedModel', document.getElementById('model-select').value);
});
</script>
</body>
</html>
