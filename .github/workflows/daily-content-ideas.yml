name: Daily Content Ideas Generator

on:
  schedule:
    # 4:00 AM IST = 10:30 PM UTC (previous day)
    - cron: '30 22 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-ideas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate content ideas
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/content_ideas.py

      - name: Upload ideas as artifact
        uses: actions/upload-artifact@v4
        with:
          name: content-ideas-${{ github.run_number }}
          path: content-ideas/
          retention-days: 30

      - name: Commit ideas to repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add content-ideas/
          git diff --staged --quiet || git commit -m "💡 Daily content ideas - $(date +'%Y-%m-%d')"
          git push
