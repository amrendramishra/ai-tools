name: Daily Repos Backup Summary

on:
  schedule:
    # 2:00 AM IST = 8:30 PM UTC (previous day)
    - cron: '30 20 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  backup-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate backup summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: amrendramishra
        run: python scripts/backup_summary.py

      - name: Commit backup summary
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "💾 Daily backup summary - $(date +'%Y-%m-%d')"
          git push
